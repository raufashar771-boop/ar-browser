name: Build AR Browser APK

on:
  push:
    branches: [iceraven, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;26.1.10909125 cmake;3.22.1'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Copy libs.versions.toml for android-components submodule
        run: |
          mkdir -p android-components/gradle
          cp gradle/libs.versions.toml android-components/gradle/libs.versions.toml

      - name: Override Termux Java path for CI
        run: sed -i '/org.gradle.java.home=/d' gradle.properties

      # The submodule imports the version catalog via a path that points OUTSIDE the
      # checkout (e.g. ../../../../../gradle/libs.versions.toml). patch_android_components.sh
      # rewrites those imports to ../../../gradle (where we copied the catalog above) and
      # strips the now-missing Glean plugin. Without this, the build fails at settings eval.
      - name: Patch android-components imports
        run: ./automation/iceraven/patch_android_components.sh

      - name: Build debug APK
        run: ./gradlew app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ar-browser-debug
          path: app/build/outputs/apk/**/debug/*.apk
          retention-days: 30
