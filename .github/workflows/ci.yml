name: CI

on:
  push:
    branches:
      - iceraven

jobs:
  release-automation:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: 'true'
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Generate ephemeral debug signing key
        run: |
          mkdir -p ~/.android
          KEYSTORE=~/.android/ar-release.keystore
          # Only seed the keystore from the secret when it actually contains data.
          # Writing an empty secret yields a 0-byte file that makes `keytool` refuse
          # to generate a key ("Keystore file exists, but is empty").
          if [ -n "${{ secrets.DEBUG_KEYSTORE_B64 }}" ]; then
            echo "${{ secrets.DEBUG_KEYSTORE_B64 }}" | base64 -d > "$KEYSTORE"
          fi
          # Remove any leftover empty file so keytool can create a fresh one.
          if [ ! -s "$KEYSTORE" ]; then
            rm -f "$KEYSTORE"
            keytool -genkeypair -v -keystore "$KEYSTORE" \
              -alias ar -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass android -keypass android \
              -dname "CN=AR Browser, OU=AR, O=AR, L=Unknown, S=Unknown, C=US"
          fi
          echo "KEYSTORE_PATH=$KEYSTORE" >> $GITHUB_ENV
          echo "KEY_ALIAS=ar" >> $GITHUB_ENV
          echo "KEYSTORE_PASS=android" >> $GITHUB_ENV
          echo "KEY_PASS=android" >> $GITHUB_ENV

      - name: Install Android SDK with pieces Gradle skips
        run: ./automation/iceraven/install-sdk.sh

      - name: Inspect memory
        run: free -h

      - name: Create version name
        run: echo "VERSION_NAME=$(git describe --tags HEAD)" >> $GITHUB_ENV

      - name: Patch on the fly
        run: |
          ./automation/iceraven/patch_android_components.sh

      - name: Relpace strings
        run: |
          sed -i 's/Firefox/AR/g' app/src/*/res/values*/*strings.xml
          sed -i '/about_content/s/Mozilla/@forkmaintainers/' app/src/*/res/values*/*strings.xml
          sed -i '/<string name="trackers_blocked_panel_categorical_num_trackers_blocked">/s/%s/%1$s/g; /<string name="trackers_blocked_panel_categorical_num_trackers_blocked">/s/%d/%2$d/g' app/src/*/res/values*/*strings.xml

      - name: Build forkRelease variant of app
        uses: gradle/gradle-build-action@v2
        env:
          # Try to stop the daemon from magically vanishing by adding random memory-related arguments.
          # See <https://stackoverflow.com/a/70010526> and <https://stackoverflow.com/a/70756876>
          # The runner seems to have ~6 gigs of memory, so we make sure to stay under that.
          # We have Java 11 so we don't have a perm size anymore.
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-XX:MaxMetaspaceSize=4g -Xms1g -Xmx7g -XX:+HeapDumpOnOutOfMemoryError -XX:HeapDumpPath=/dev/stderr"
        with:
          gradle-home-cache-cleanup: true
          gradle-executable: /usr/bin/time
          arguments: -v ./gradlew app:assembleForkRelease -PversionName=${{ env.VERSION_NAME }} --stacktrace --no-daemon

      - name: Setup build tool version variable
        shell: bash
        run: |
          BUILD_TOOL_VERSION=$(ls /usr/local/lib/android/sdk/build-tools/ | tail -n 1)
          echo "BUILD_TOOL_VERSION=$BUILD_TOOL_VERSION" >> $GITHUB_ENV

      - name: Create signed APKs
        uses: abhijitvalluri/sign-apks@v0.8
        with:
          releaseDirectory: gradle/build/app/outputs/apk/forkRelease/
          signingKeyBase64: ${{ secrets.DEBUG_SIGNING_KEY }}
          alias: ${{ secrets.DEBUG_ALIAS }}
          keyStorePassword: ${{ secrets.DEBUG_KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.DEBUG_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ env.BUILD_TOOL_VERSION }}

      - name: Debug
        run: |
          /usr/bin/ls -alh gradle/build/app/outputs/apk/forkRelease/

      - name: Upload arm64 apk
        uses: actions/upload-artifact@v4
        with:
          path: gradle/build/app/outputs/apk/forkRelease/app-arm64-v8a-forkRelease.apk
          name: ${{ env.VERSION_NAME }}-browser-arm64-v8a-forkRelease.apk

      - name: Upload armeabi apk
        uses: actions/upload-artifact@v4
        with:
          path: gradle/build/app/outputs/apk/forkRelease/app-armeabi-v7a-forkRelease.apk
          name: ${{ env.VERSION_NAME }}-browser-armeabi-v7a-forkRelease.apk

      - name: Upload x86_64 apk
        uses: actions/upload-artifact@v4
        with:
          path: gradle/build/app/outputs/apk/forkRelease/app-x86_64-forkRelease.apk
          name: ${{ env.VERSION_NAME }}-browser-x86_64-forkRelease.apk
