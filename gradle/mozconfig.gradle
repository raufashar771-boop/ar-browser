import groovy.json.JsonSlurper

def slurper = new JsonSlurper()

def projectRootDir = gradle.ext.projectRootDir ?: System.getProperty("user.dir")

def json = slurper.parse(new File("${projectRootDir}/mozconfig.json"))

gradle.ext.mozconfig = json
gradle.ext.mozconfig.substs.MOZ_APP_VERSION = file("${projectRootDir}/version.txt").getText('utf-8').replaceAll("\n", "")
gradle.ext.mozconfig.substs.MOZ_ANDROID_FAT_AAR_ARCHITECTURES = true
gradle.ext.mozconfig.substs.MOZ_UPDATE_CHANNEL = 'release'
gradle.ext.mozconfig.substs.ALLOW_INSECURE_GRADLE_REPOSITORIES = true
gradle.ext.mozconfig.substs.ANDROID_BUILD_TOOLS_VERSION = "36.0.0"
gradle.ext.mozconfig.substs.ANDROID_NDK_MAJOR_VERSION = "27"
gradle.ext.mozconfig.substs.ANDROID_NDK_MINOR_VERSION = "0"
gradle.ext.mozconfig.substs.NIMBUS_FML = "${projectRootDir}/dist/host/bin/nimbus-fml"
gradle.ext.mozconfig.topsrcdir = projectRootDir
gradle.ext.mozconfig.topobjdir = projectRootDir

gradle.startParameter.offline = false

gradle.ext.configureMavenRepositories = { handler ->
    gradle.mozconfig.substs.GRADLE_MAVEN_REPOSITORIES.each { repository ->
        handler.maven {
            url = repository
            if (gradle.mozconfig.substs.ALLOW_INSECURE_GRADLE_REPOSITORIES) {
                allowInsecureProtocol = true
            }
        }
    }
}
